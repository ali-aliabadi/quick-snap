# Production stack: Django (gunicorn) only. TLS + :80/:443 are handled by the
# host's existing nginx (this is a shared VPS), which reverse-proxies to the
# localhost port below. Cloudflare sits in front and terminates public TLS.
#
# nginx vhost: deploy/nginx-quicksnap.conf  ->  proxies to 127.0.0.1:8010
# Static/media are bind-mounted to host paths so nginx can serve them directly.

services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Persist SQLite on the db_data volume (4 slashes = absolute path).
      - DATABASE_URL=sqlite:////app/data/db.sqlite3
    ports:
      # Bind to loopback only — never exposed publicly; nginx proxies to it.
      - "127.0.0.1:8010:8000"
    volumes:
      - db_data:/app/data
      # Host paths so the host nginx can serve these files directly.
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles

volumes:
  db_data:
