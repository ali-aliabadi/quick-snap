<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>{{ event.name }} — Viewfinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --film-black:#17110D; --safelight:#F0A63A; --shutter:#D63B24;
      --ivory:#F3EAD9; --muted:#A08A72; --sprocket:#0E0A07;
    }
    * { box-sizing:border-box; }
    html, body { margin:0; height:100dvh; background:#000; overflow:hidden;
      font-family:"Space Mono",monospace; }
    #video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; background:#000; }
    #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; }
    #flash.fire { animation:flash .18s ease-out; }
    @keyframes flash { 0%{opacity:.92} 100%{opacity:0} }

    /* film-frame corner brackets — you're shooting *inside* a frame */
    .brackets { position:fixed; inset:0; pointer-events:none; }
    .brackets::before, .brackets::after,
    .brackets > i::before, .brackets > i::after {
      content:""; position:absolute; width:26px; height:26px;
      border:2px solid rgba(243,234,217,.55);
    }
    .brackets::before { top:calc(env(safe-area-inset-top) + 76px); left:20px; border-right:0; border-bottom:0; }
    .brackets::after  { top:calc(env(safe-area-inset-top) + 76px); right:20px; border-left:0; border-bottom:0; }
    .brackets > i::before { bottom:150px; left:20px; border-right:0; border-top:0; }
    .brackets > i::after  { bottom:150px; right:20px; border-left:0; border-top:0; }

    /* --- Exposure counter window: the signature. A lit mechanical readout. --- */
    #counter {
      position:fixed; top:calc(env(safe-area-inset-top) + 16px); left:50%; transform:translateX(-50%);
      display:flex; align-items:baseline; gap:8px;
      background:rgba(14,10,7,.72); border:1px solid rgba(240,166,58,.45);
      border-radius:3px; padding:8px 16px; backdrop-filter:blur(8px);
      box-shadow:0 0 18px rgba(240,166,58,.18);
    }
    #counter .num { font-size:1.55rem; font-weight:700; color:var(--safelight);
      font-variant-numeric:tabular-nums; line-height:1; text-shadow:0 0 10px rgba(240,166,58,.5); }
    #counter .lab { font-size:.62rem; letter-spacing:.24em; color:var(--muted); text-transform:uppercase; }

    #endcd {
      position:fixed; top:calc(env(safe-area-inset-top) + 62px); left:50%; transform:translateX(-50%);
      font-size:.68rem; letter-spacing:.16em; color:rgba(243,234,217,.82); text-transform:uppercase;
      text-shadow:0 1px 3px rgba(0,0,0,.8); font-variant-numeric:tabular-nums;
    }
    #endcd:empty { display:none; }

    #switch {
      position:absolute; right:28px; bottom:calc(env(safe-area-inset-bottom) + 47px);
      width:52px; height:52px; border-radius:50%;
      background:rgba(14,10,7,.72); color:var(--ivory); border:1px solid rgba(243,234,217,.22);
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      backdrop-filter:blur(8px); transition:transform .15s, background .15s;
    }
    html[dir="rtl"] #switch { right:auto; left:28px; }
    #switch:active { transform:scale(.92); background:rgba(14,10,7,.9); }
    #switch svg { width:24px; height:24px; }

    .controls {
      position:fixed; left:0; right:0; bottom:0; display:flex; flex-direction:column;
      align-items:center; gap:14px; padding-bottom:calc(env(safe-area-inset-bottom) + 34px);
    }
    .shutter-row {
      display:flex; align-items:center; justify-content:center;
    }
    /* mechanical shutter release — the one red thing in the whole app */
    #snap {
      width:78px; height:78px; border-radius:50%; border:3px solid rgba(243,234,217,.85);
      background:var(--shutter); cursor:pointer; padding:0;
      box-shadow:0 0 0 6px rgba(0,0,0,.35), inset 0 -3px 8px rgba(0,0,0,.4);
      transition:transform .07s;
    }
    #snap:active { transform:scale(.9); }
    #snap:disabled { background:#5a4b40; border-color:rgba(243,234,217,.35); }
    #hint { color:rgba(243,234,217,.72); font-size:.64rem; letter-spacing:.22em;
      text-transform:uppercase; text-shadow:0 1px 3px rgba(0,0,0,.7); }

    /* gate + overlay share the darkroom look */
    #gate, #overlay {
      position:fixed; inset:0; display:none; flex-direction:column; align-items:center;
      justify-content:center; gap:12px; padding:32px; text-align:center;
      background:radial-gradient(120% 90% at 50% 0%, rgba(240,166,58,.08), transparent 55%), rgba(23,17,13,.94);
      backdrop-filter:blur(10px); color:var(--ivory);
    }
    #gate.show, #overlay.show { display:flex; }
    #gate-msg, #overlay-msg { font-family:"Fraunces",serif; font-weight:500; font-size:1.35rem; }
    #gate-cd { font-size:2.4rem; font-weight:700; color:var(--safelight);
      font-variant-numeric:tabular-nums; text-shadow:0 0 16px rgba(240,166,58,.4); }
    #overlay-retry { margin-top:12px; padding:13px 26px; border:0; border-radius:3px;
      background:var(--safelight); color:#1A120A; font-family:"Space Mono",monospace;
      font-weight:700; letter-spacing:.16em; text-transform:uppercase; font-size:.82rem; }
    /* --- Sending overlay: a developing photo, with a live progress ring --- */
    #sending {
      position:fixed; inset:0; z-index:20; display:none; flex-direction:column;
      align-items:center; justify-content:center; gap:22px;
      background:radial-gradient(120% 90% at 50% 42%, rgba(23,17,13,.72), rgba(9,6,4,.9));
      backdrop-filter:blur(6px);
    }
    #sending.show { display:flex; }
    .ring { position:relative; width:150px; height:150px; }
    .ring svg { position:absolute; inset:0; width:100%; height:100%; }
    .ring circle { fill:none; }

    /* Outer decorative spinner — always rotating, hard and mechanical. */
    .ring .spin-svg { animation:ringspin .85s linear infinite; }
    .ring .spin {
      stroke:var(--shutter); stroke-width:4; stroke-linecap:round;
      stroke-dasharray:70 380; stroke-dashoffset:0;
      filter:drop-shadow(0 0 5px rgba(214,59,36,.6));
    }
    @keyframes ringspin { to { transform:rotate(360deg); } }

    /* Inner progress ring — fills like a bar as bytes upload. */
    .ring .prog-svg { transform:rotate(-90deg); }
    .ring .track { stroke:rgba(243,234,217,.12); stroke-width:7; }
    .ring .prog {
      stroke:var(--safelight); stroke-width:7; stroke-linecap:round;
      stroke-dasharray:326.726; stroke-dashoffset:326.726;
      filter:drop-shadow(0 0 6px rgba(240,166,58,.55));
      transition:stroke-dashoffset .25s ease;
    }
    /* Before the upload starts (capturing/encoding), the progress ring is
       empty and the % is hidden — only the outer spinner shows motion. */
    #sending.indeterminate .ring .prog { transition:none; }
    #sending.indeterminate .ring .pct { opacity:0; }

    .ring .pct {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      gap:1px; color:var(--ivory); font-weight:700; font-size:2rem;
      font-variant-numeric:tabular-nums; text-shadow:0 0 12px rgba(240,166,58,.4);
      transition:opacity .2s;
    }
    .ring .pct i { font-style:normal; font-size:.9rem; color:var(--muted); align-self:flex-start; margin-top:8px; }
    .send-label {
      font-size:.68rem; letter-spacing:.28em; text-transform:uppercase; color:var(--muted);
    }

    @media (prefers-reduced-motion:reduce) { #snap, #flash { transition:none; animation:none; } }
  </style>
</head>
<body
  data-capture-url="{% url 'snap:capture' event.slug %}"
  data-done-url="{% url 'snap:done' event.slug %}"
  data-remaining="{{ remaining }}"
  data-start="{{ event.start_at|date:'c' }}"
  data-end="{{ event.end_at|date:'c' }}"
  data-lang="{{ lang }}"
  data-t-closes="{{ t.cd_closes }}"
  data-t-gate="{{ t.gate_opens }}"
  data-t-camerr="{{ t.cam_err }}"
  data-t-uperr="{{ t.upload_err }}">

  <video id="video" playsinline autoplay muted></video>
  <div id="flash"></div>
  <div class="brackets"><i></i></div>

  <div id="counter"><span class="num">0</span><span class="lab">{{ t.exp_left }}</span></div>
  <div id="endcd"></div>

  <div class="controls">
    <div class="shutter-row">
      <button id="snap" type="button" aria-label="Take photo"></button>
    </div>
    <div id="hint">{{ t.tap_expose }}</div>
    <button id="switch" type="button" aria-label="{{ t.flip }}" title="{{ t.flip }}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 8a8 8 0 00-14-3M4 5v3h3"/>
        <path d="M4 16a8 8 0 0014 3M20 19v-3h-3"/>
      </svg>
    </button>
  </div>

  <div id="sending">
    <div class="ring">
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <circle class="track" cx="60" cy="60" r="52"></circle>
        <circle class="prog" cx="60" cy="60" r="52"></circle>
      </svg>
      <div class="pct"><span id="pct-num">0</span><i>%</i></div>
    </div>
    <div class="send-label">{{ t.cam_sending }}</div>
  </div>

  <div id="gate">
    <div id="gate-msg">{{ t.gate_opens }}</div>
    <div id="gate-cd"></div>
  </div>

  <div id="overlay">
    <div id="overlay-msg">{{ t.cam_err }}</div>
    <button id="overlay-retry" type="button">{{ t.retry }}</button>
  </div>

  <canvas id="canvas" hidden></canvas>

  {% csrf_token %}
  <script>
  (function () {
    const body = document.body;
    const CAPTURE_URL = body.dataset.captureUrl;
    const DONE_URL = body.dataset.doneUrl;
    let remaining = parseInt(body.dataset.remaining, 10);
    const startAt = body.dataset.start ? new Date(body.dataset.start) : null;
    const endAt = body.dataset.end ? new Date(body.dataset.end) : null;
    const fa = body.dataset.lang === "fa";
    const T = {
      closes: body.dataset.tCloses, gate: body.dataset.tGate,
      camErr: body.dataset.tCamerr, upErr: body.dataset.tUperr,
    };
    const faDigit = s => fa ? s.replace(/[0-9]/g, d => "۰۱۲۳۴۵۶۷۸۹"[d]) : s;
    let facing = "environment";
    let stream = null;
    let track = null;
    let imageCapture = null;
    let busy = false;

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const snap = document.getElementById("snap");
    const flash = document.getElementById("flash");
    const counterNum = document.querySelector("#counter .num");
    const endcd = document.getElementById("endcd");
    const gate = document.getElementById("gate");
    const gateCd = document.getElementById("gate-cd");
    const sending = document.getElementById("sending");
    const ringProg = document.querySelector("#sending .ring .prog");
    const pctNum = document.getElementById("pct-num");
    const overlay = document.getElementById("overlay");
    const overlayMsg = document.getElementById("overlay-msg");
    const csrf = document.querySelector("input[name=csrfmiddlewaretoken]").value;

    function fmt(ms) {
      let s = Math.max(0, Math.floor(ms / 1000));
      const d = Math.floor(s / 86400); s -= d * 86400;
      const h = Math.floor(s / 3600); s -= h * 3600;
      const m = Math.floor(s / 60); s -= m * 60;
      const p = n => String(n).padStart(2, "0");
      return faDigit((d > 0 ? d + "d " : "") + p(h) + ":" + p(m) + ":" + p(s));
    }

    function started() { return !startAt || new Date() >= startAt; }
    function ended() { return endAt && new Date() > endAt; }

    function renderCounter() {
      counterNum.textContent = faDigit(String(remaining).padStart(2, "0"));
    }

    function tickClocks() {
      const now = new Date();
      if (startAt && now < startAt) {
        gate.classList.add("show");
        document.getElementById("gate-msg").textContent = T.gate;
        gateCd.textContent = fmt(startAt - now);
        snap.disabled = true;
      } else {
        gate.classList.remove("show");
        if (!busy && !ended()) snap.disabled = false;
      }
      if (endAt) {
        if (ended()) { window.location = DONE_URL; return; }
        endcd.textContent = T.closes + " " + fmt(endAt - now);
      }
    }

    function showOverlay(msg, showRetry) {
      overlayMsg.textContent = msg;
      document.getElementById("overlay-retry").style.display = showRetry ? "" : "none";
      overlay.classList.add("show");
    }

    async function startCamera() {
      overlay.classList.remove("show");
      if (stream) stream.getTracks().forEach(t => t.stop());
      track = null; imageCapture = null;
      try {
        // Ask for the highest resolution the device will give us; the browser
        // clamps to the sensor's real max. Continuous autofocus keeps guests'
        // shots sharp without a tap-to-focus step.
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facing },
            width: { ideal: 4096 },
            height: { ideal: 2160 },
            frameRate: { ideal: 30 },
          },
          audio: false,
        });
        video.srcObject = stream;
        track = stream.getVideoTracks()[0];

        // Best-effort focus/exposure hints (ignored where unsupported).
        try {
          const caps = track.getCapabilities ? track.getCapabilities() : {};
          const adv = [];
          if (caps.focusMode && caps.focusMode.includes("continuous")) adv.push({ focusMode: "continuous" });
          if (caps.exposureMode && caps.exposureMode.includes("continuous")) adv.push({ exposureMode: "continuous" });
          if (caps.whiteBalanceMode && caps.whiteBalanceMode.includes("continuous")) adv.push({ whiteBalanceMode: "continuous" });
          if (adv.length) await track.applyConstraints({ advanced: adv });
        } catch (e) { /* focus hints are optional */ }

        // ImageCapture gives us a full-resolution still (not the downscaled
        // preview frame). Feature-detected; we fall back to the canvas path.
        if (window.ImageCapture && track) {
          try { imageCapture = new ImageCapture(track); } catch (e) { imageCapture = null; }
        }
      } catch (err) {
        showOverlay(T.camErr, true);
      }
    }

    // You care about quality over speed, so capture large: cap the long edge
    // at 3840px (~4K) and encode at high quality. The upload shows a live
    // percentage, so a bigger file is fine on a slower venue connection.
    const MAX_EDGE = 3840;
    const JPEG_Q = 0.94;
    const TAKEPHOTO_MS = 3500;   // ImageCapture can hang; bail to canvas fast
    const UPLOAD_MS = 45000;     // generous — the ring shows real progress

    function withTimeout(promise, ms, label) {
      let timer;
      const guard = new Promise((_, rej) => {
        timer = setTimeout(() => rej(new Error(label || "timeout")), ms);
      });
      return Promise.race([promise, guard]).finally(() => clearTimeout(timer));
    }

    function encode(source, sw, sh, mirror) {
      const scale = Math.min(1, MAX_EDGE / Math.max(sw, sh));
      const dw = Math.max(1, Math.round(sw * scale));
      const dh = Math.max(1, Math.round(sh * scale));
      canvas.width = dw; canvas.height = dh;
      const ctx = canvas.getContext("2d");
      if (mirror) { ctx.translate(dw, 0); ctx.scale(-1, 1); }
      ctx.drawImage(source, 0, 0, dw, dh);
      return new Promise(r => canvas.toBlob(r, "image/jpeg", JPEG_Q));
    }

    async function grabBlob() {
      const mirror = facing === "user";
      // Preferred: full-resolution still from the sensor — but time-boxed,
      // because takePhoto() stalls on some devices. Falls back to the frame.
      if (imageCapture) {
        try {
          const shot = await withTimeout(imageCapture.takePhoto(), TAKEPHOTO_MS, "takephoto");
          if (shot && shot.size > 0) {
            const bmp = await createImageBitmap(shot);
            const out = await encode(bmp, bmp.width, bmp.height, mirror);
            if (bmp.close) bmp.close();
            return out;
          }
        } catch (e) { /* fall through to the reliable canvas path */ }
      }
      // Reliable path: the current preview frame at its native resolution.
      return encode(video, video.videoWidth, video.videoHeight, mirror);
    }

    const RING_LEN = 326.726;  // 2·π·52 — must match the SVG circle radius

    function setProgress(pct) {
      // pct null => indeterminate (spinning); number => determinate ring.
      if (pct == null) {
        ringProg.style.strokeDashoffset = RING_LEN * 0.75;
        sending.classList.add("indeterminate");
        pctNum.textContent = "";
      } else {
        sending.classList.remove("indeterminate");
        const p = Math.max(0, Math.min(100, pct));
        ringProg.style.strokeDashoffset = RING_LEN * (1 - p / 100);
        pctNum.textContent = faDigit(String(Math.round(p)));
      }
    }

    // XHR upload so we can report real bytes-sent progress (fetch cannot).
    function uploadBlob(blob) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", CAPTURE_URL, true);
        xhr.setRequestHeader("X-CSRFToken", csrf);
        xhr.timeout = UPLOAD_MS;
        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) setProgress((e.loaded / e.total) * 100);
        };
        xhr.upload.onload = () => setProgress(100);  // bytes done; server working
        xhr.onload = () => resolve({ status: xhr.status, text: xhr.responseText });
        xhr.onerror = () => reject(new Error("network"));
        xhr.ontimeout = () => reject(new Error("timeout"));
        const fd = new FormData();
        fd.append("image", blob, "snap.jpg");
        xhr.send(fd);
      });
    }

    async function takePhoto() {
      if (busy || remaining <= 0 || !stream) return;
      if (!started() || ended()) return;
      busy = true; snap.disabled = true;

      flash.classList.remove("fire"); void flash.offsetWidth; flash.classList.add("fire");
      setProgress(null);            // capturing / encoding: indeterminate
      sending.classList.add("show");

      try {
        const blob = await grabBlob();
        setProgress(0);             // start of upload
        const res = await uploadBlob(blob);

        if (res.status === 409) { window.location = DONE_URL; return; }
        if (res.status === 403) {
          let d = {};
          try { d = JSON.parse(res.text); } catch (e) {}
          if (d.error === "ended" || d.error === "closed") { window.location = DONE_URL; return; }
          tickClocks();
          return;
        }
        if (res.status < 200 || res.status >= 300) throw new Error("upload failed");
        const data = JSON.parse(res.text);
        remaining = data.remaining;
        renderCounter();
        if (data.done) { window.location = DONE_URL; return; }
      } catch (e) {
        showOverlay(T.upErr, true);
      } finally {
        sending.classList.remove("show");
        busy = false; snap.disabled = false;
      }
    }

    snap.addEventListener("click", takePhoto);
    document.getElementById("switch").addEventListener("click", () => {
      facing = facing === "environment" ? "user" : "environment";
      video.style.transform = facing === "user" ? "scaleX(-1)" : "none";
      startCamera();
    });
    document.getElementById("overlay-retry").addEventListener("click", startCamera);

    renderCounter();
    tickClocks();
    if (startAt || endAt) setInterval(tickClocks, 1000);
    startCamera();
  })();
  </script>
</body>
</html>
