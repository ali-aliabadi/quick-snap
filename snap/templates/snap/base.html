{% load static %}
<!DOCTYPE html>
<html lang="{{ lang }}" dir="{% if rtl %}rtl{% else %}ltr{% endif %}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>{% block title %}Quick Snap{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Space+Mono:wght@400;700&family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --film-black:#17110D;      /* warm darkroom black */
      --panel:#211812;           /* raised label panel */
      --panel-edge:rgba(243,234,217,.10);
      --safelight:#F0A63A;       /* amber safelight — primary accent */
      --safelight-dim:rgba(240,166,58,.16);
      --shutter:#D63B24;         /* mechanical red — capture/live only */
      --ivory:#F3EAD9;           /* film-paper text */
      --muted:#A08A72;           /* warm taupe secondary */
      --sprocket:#0E0A07;        /* punched hole */
      --font-body:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      --font-display:"Fraunces",serif;
      --font-mono:"Space Mono",monospace;   /* labels, data (Latin) */
    }
    /* Persian: Vazirmatn everywhere, no uppercasing / letter-spacing tricks */
    html[dir="rtl"] {
      --font-body:"Vazirmatn",system-ui,sans-serif;
      --font-display:"Vazirmatn",serif;
      --font-mono:"Vazirmatn","Space Mono",monospace;
    }
    html[dir="rtl"] .eyebrow, html[dir="rtl"] label,
    html[dir="rtl"] button, html[dir="rtl"] .btn,
    html[dir="rtl"] .spec, html[dir="rtl"] .countdown {
      text-transform:none; letter-spacing:0;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100dvh; background:var(--film-black); color:var(--ivory);
      font-family:var(--font-body);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:0; overflow-x:hidden;
      background-image:radial-gradient(120% 80% at 50% -10%, rgba(240,166,58,.10), transparent 60%);
    }

    /* --- Film sprocket edge: the signature structural device --- */
    .film-edge {
      width:100%; max-width:460px; height:20px;
      background-color:var(--safelight-dim);
      background-image:radial-gradient(circle at 13px 50%, var(--sprocket) 0 4px, transparent 5px);
      background-size:26px 100%; background-repeat:repeat-x;
    }

    .stage { width:100%; max-width:460px; padding:0 22px; }

    .eyebrow {
      font-family:var(--font-mono); font-size:.72rem; letter-spacing:.32em;
      text-transform:uppercase; color:var(--safelight); margin:26px 0 10px;
    }
    h1 {
      font-family:var(--font-display); font-weight:500; font-size:2.6rem; line-height:1.02;
      margin:0 0 6px; letter-spacing:-.01em;
    }
    .muted { color:var(--muted); font-size:.92rem; line-height:1.6; margin:0; }

    .spec {
      font-family:var(--font-mono); font-size:.78rem; letter-spacing:.08em;
      color:var(--muted); display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      margin:16px 0 0; text-transform:uppercase;
    }
    .spec .dot { color:var(--safelight); }
    .spec b { color:var(--ivory); font-weight:700; }

    .panel {
      background:var(--panel); border:1px solid var(--panel-edge); border-radius:4px;
      padding:22px; margin:22px 0;
    }

    label {
      display:block; font-family:var(--font-mono); font-size:.68rem; letter-spacing:.18em;
      text-transform:uppercase; color:var(--muted); margin:16px 0 7px;
    }
    label:first-child { margin-top:0; }
    input[type=text], input[type=email], input[type=password] {
      width:100%; padding:13px 14px; border-radius:3px; border:1px solid var(--panel-edge);
      background:#160F0B; color:var(--ivory); font-size:1rem; font-family:var(--font-body);
      transition:border-color .15s, box-shadow .15s;
    }
    input:focus {
      outline:none; border-color:var(--safelight);
      box-shadow:0 0 0 3px var(--safelight-dim);
    }

    button, .btn {
      width:100%; margin-top:22px; padding:15px; border:0; border-radius:3px;
      background:var(--safelight); color:#1A120A;
      font-family:var(--font-mono); font-size:.9rem; font-weight:700;
      letter-spacing:.16em; text-transform:uppercase; cursor:pointer;
      transition:transform .08s, filter .15s;
    }
    button:active, .btn:active { transform:translateY(1px); filter:brightness(1.06); }

    .errors {
      background:rgba(214,59,36,.14); border:1px solid rgba(214,59,36,.5); color:#F4B4A6;
      border-radius:3px; padding:11px 14px; font-size:.88rem; margin:0 0 4px;
      font-family:var(--font-body);
    }
    .errors ul { margin:0; padding-inline-start:18px; }

    .countdown {
      font-family:var(--font-mono); font-size:.82rem; letter-spacing:.1em;
      color:var(--safelight); background:var(--safelight-dim);
      border-inline-start:2px solid var(--safelight); border-radius:2px;
      padding:11px 14px; margin:18px 0 2px; font-variant-numeric:tabular-nums;
      text-transform:uppercase;
    }

    @media (prefers-reduced-motion:reduce) { * { transition:none !important; animation:none !important; } }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
