# Host nginx vhost for Quick Snap. Lives at /etc/nginx/sites-available/quicksnap
# and is symlinked into sites-enabled. Coexists with other sites on this VPS.
#
# Cloudflare (orange cloud) terminates public TLS and connects to this origin
# over :443 using a self-signed cert -> set Cloudflare SSL/TLS mode to "Full".
# The gunicorn container listens on 127.0.0.1:8010 (docker-compose.prod.yml).

server {
    listen 80;
    listen [::]:80;
    server_name alialiabadi.ir;
    # Direct HTTP hits (and Cloudflare in Flexible mode) -> push to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name alialiabadi.ir;

    ssl_certificate     /etc/nginx/ssl/quicksnap.crt;
    ssl_certificate_key /etc/nginx/ssl/quicksnap.key;

    # Camera JPEG uploads — keep comfortably above the app's 15 MB cap.
    client_max_body_size 20m;

    # Django static files (collectstatic output, bind-mounted to host).
    location /static/ {
        alias /srv/quicksnap/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Locally-stored photos (only when USE_S3=False).
    location /media/ {
        alias /srv/quicksnap/media/;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Django trusts this header (SECURE_PROXY_SSL_HEADER) to know it's HTTPS.
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
