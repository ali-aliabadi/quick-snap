# Host nginx vhost for Quick Snap. Lives at /etc/nginx/sites-available/quicksnap
# and is symlinked into sites-enabled. Coexists with other sites on this VPS.
#
# Cloudflare (orange cloud) fronts this origin. To avoid a redirect loop we do
# NOT force :80 -> :443 here; instead both listeners serve the app and pass
# Cloudflare's X-Forwarded-Proto through so Django knows the visitor's real
# scheme. This works whether Cloudflare SSL/TLS mode is "Flexible" (CF -> origin
# over :80) or "Full" (CF -> origin over :443 using the self-signed cert).
# Recommended: set Cloudflare to "Full" + enable "Always Use HTTPS" at the edge.

# Shared proxy/static config for both listeners.
# (kept inline in each server block below; nginx has no cross-block include here)

# Use Cloudflare's forwarded scheme when present; fall back to this
# connection's scheme for direct origin hits (no proxy header).
map $http_x_forwarded_proto $forwarded_scheme {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name alialiabadi.ir;

    ssl_certificate     /etc/nginx/ssl/quicksnap.crt;
    ssl_certificate_key /etc/nginx/ssl/quicksnap.key;

    # Camera JPEG uploads — keep comfortably above the app's 15 MB cap.
    client_max_body_size 20m;

    # Django static files (collectstatic output, bind-mounted to host).
    location /static/ {
        alias /srv/quicksnap/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Locally-stored photos (only when USE_S3=False).
    location /media/ {
        alias /srv/quicksnap/media/;
        access_log off;
    }

    # v2ray/vmess websocket upstream (pre-existing service; clients connect to
    # alialiabadi.ir/twpd). Kept here so it survives now that this vhost owns the
    # domain — mirrors the original default-site block.
    location /twpd {
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:1310;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Trust Cloudflare's scheme (falls back to this connection's scheme for
        # direct origin hits). Django reads this via SECURE_PROXY_SSL_HEADER.
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
        proxy_read_timeout 60s;
    }
}
